<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER1 DEVELOPMENT — FiveM Assets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.15) 0%, transparent 70%);
            animation: float 20s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            width: 400px;
            height: 400px;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 300px;
            height: 300px;
            top: 60%;
            right: -5%;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.1) 0%, transparent 70%);
            animation-delay: -5s;
        }

        .particle:nth-child(3) {
            width: 250px;
            height: 250px;
            bottom: -5%;
            left: 30%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.08) 0%, transparent 70%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, rgba(20, 25, 45, 0.95) 0%, rgba(15, 20, 35, 0.98) 100%);
            border-radius: 24px;
            padding: 36px 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 0 60px rgba(233, 69, 96, 0.08);
            backdrop-filter: blur(20px);
            animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            box-shadow:
                0 0 30px rgba(233, 69, 96, 0.4),
                0 4px 15px rgba(233, 69, 96, 0.2);
            animation: avatarPulse 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(233, 69, 96, 0.4), 0 4px 15px rgba(233, 69, 96, 0.2); }
            50% { box-shadow: 0 0 50px rgba(233, 69, 96, 0.6), 0 4px 15px rgba(233, 69, 96, 0.3); }
        }

        .header-text h1 {
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .header-text p {
            font-size: 13px;
            color: #8b8fa3;
            margin-top: 3px;
            font-weight: 400;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 24px 0;
            position: relative;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.4), transparent);
        }

        /* Service cards */
        .services {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .service-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 18px;
            border-radius: 16px;
            border-left: 3px solid transparent;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(233, 69, 96, 0.05) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-card:hover {
            transform: translateX(6px);
            background: rgba(255, 255, 255, 0.05);
        }

        .service-card.eup {
            border-left-color: #e94560;
        }

        .service-card.ped {
            border-left-color: #4ecdc4;
        }

        .service-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .service-card.eup .service-icon {
            background: rgba(233, 69, 96, 0.12);
        }

        .service-card.ped .service-icon {
            background: rgba(78, 205, 196, 0.12);
        }

        .service-info {
            position: relative;
            z-index: 1;
        }

        .service-info h3 {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 3px;
        }

        .service-info p {
            font-size: 12px;
            color: #6b7085;
            font-weight: 400;
        }

        /* Trust badge */
        .trust-badge {
            text-align: center;
            padding: 14px;
            background: rgba(78, 205, 196, 0.04);
            border-radius: 14px;
            border: 1px solid rgba(78, 205, 196, 0.1);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .trust-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(78, 205, 196, 0.05), transparent);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .trust-badge span {
            font-size: 13px;
            color: #4ecdc4;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        /* Buttons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.35);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(233, 69, 96, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #b0b4c4;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-icon {
            font-size: 16px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #4a4f5e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .footer .dot {
            width: 6px;
            height: 6px;
            background: #4ecdc4;
            border-radius: 50%;
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* Glow effect behind card */
        .card-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 110%;
            background: radial-gradient(ellipse, rgba(233, 69, 96, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(40px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 28px 22px;
                border-radius: 20px;
            }
            .header-text h1 {
                font-size: 19px;
            }
            .avatar {
                width: 56px;
                height: 56px;
                font-size: 22px;
            }
        }

        /* Stagger animation for children */
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }
        .stagger-6 { animation-delay: 0.6s; }

        .animate-in {
            opacity: 0;
            animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(15px);
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div style="position: relative;">
        <div class="card-glow"></div>
        <div class="card">
            <div class="header animate-in stagger-1">
                <div class="avatar">P1</div>
                <div class="header-text">
                    <h1>PLAYER1 DEVELOPMENT</h1>
                    <p>FiveM Assets Creator</p>
                </div>
            </div>

            <div class="divider animate-in stagger-2"></div>

            <div class="services">
                <div class="service-card eup animate-in stagger-3">
                    <div class="service-icon">🎽</div>
                    <div class="service-info">
                        <h3>EUP Developer</h3>
                        <p>Premium clothing & gear for RP servers</p>
                    </div>
                </div>
                <div class="service-card ped animate-in stagger-4">
                    <div class="service-icon">🥷</div>
                    <div class="service-info">
                        <h3>PED Developer</h3>
                        <p>Custom characters & NPC models</p>
                    </div>
                </div>
            </div>

            <div class="trust-badge animate-in stagger-5">
                <span>⭐ Trusted by server owners worldwide</span>
            </div>

            <div class="buttons animate-in stagger-5">
                <a href="https://player1-store.tebex.io/tag" target="_blank" class="btn btn-primary">
                    <span class="btn-icon">🛒</span>
                    SKLEP — player1-store.tebex.io
                </a>
                <a href="https://www.gta5-mods.com/users/_Player1_" target="_blank" class="btn btn-secondary">
                    <span class="btn-icon">📁</span>
                    PORTFOLIO — gta5-mods.com/users/_Player1_
                </a>
            </div>

            <div class="footer animate-in stagger-6">
                <span class="dot"></span>
                <span>DM for custom commissions</span>
            </div>
        </div>
    </div>

    <script>
        // Mouse parallax effect for particles
        document.addEventListener('mousemove', (e) => {
            const particles = document.querySelectorAll('.particle');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            particles.forEach((particle, index) => {
                const speed = (index + 1) * 15;
                const xOffset = (x - 0.5) * speed;
                const yOffset = (y - 0.5) * speed;
                particle.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
            });
        });

        // Smooth hover tilt effect for card (subtle)
        const card = document.querySelector('.card');
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            const rotateX = (y / rect.height) * -2;
            const rotateY = (x / rect.width) * 2;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
        });
    </script>
</body>
</html>
